name: Build APK

on:
  workflow_dispatch:  # 手动触发构建

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4  # 使用 Java v4 避免报错
      with:
        java-version: '17'
        distribution: 'adopt'

    #- name: Grant execute permission for gradlew
      #run: chmod +x gradlew
    - name: Build with Gradle
      run: gradle build


    #- name: Build with Gradle
      #run: ./gradlew assembleDebug

    - name: 上传到 Release
      uses: ncipollo/release-action@v1
      with:
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: "app/build/outputs/apk/debug/*.apk"
          name: "Auto Build ${{ github.run_number }}"
          tag: "build-${{ github.run_id }}"
          replacesArtifacts: true   # <--- 这里修正了参数名
          allowUpdates: true        # <--- 允许更新已存在的 Release
          
