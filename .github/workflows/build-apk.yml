name: Build APK

on:
  workflow_dispatch: # 允许手动触发
  workflow_call: # 允许被其他工作流（截图）调用

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'

      # 增加缓存步骤，防止下载依赖超时
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # 修正指令：使用 assembleDebug 才是真正打包 APK
      # 同时加上 -x lint 跳过检查加快速度
      - name: Build APK
        run: ./gradlew assembleDebug -x lint

      # 修正钥匙：使用你配置的 MY_TOKEN，这样才能触发后续动作
      - name: 上传到 Release
        uses: ncipollo
