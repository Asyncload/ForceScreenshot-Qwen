name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 下载代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 配置 Java 环境
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "adopt"

      # 3. 设置 Android SDK (使用国内镜像源)
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        env:
          # 使用国内镜像源，解决网络问题
          ANDROID_SDK_ROOT: ${{ runner.tool_cache }}/android/sdk
          ANDROID_HOME: ${{ runner.tool_cache }}/android/sdk
          # 以下是常用的 SDK 包，可以根据你的项目需求调整
          SDK_PACKAGES: "platform-tools platform-tools platform-tools platform-tools"

      # 4. 编译 APK
      - name: Build Debug APK
        run: |
          # 使用 gradle 命令，而不是 ./gradlew
          gradle assembleDebug

      # 5. 上传到 Release
      - name: Upload to Release
        uses: "ncipollo/release-action@v1"
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: "app/build/outputs/apk/debug/*.apk"
          name: "Auto Build ${{ github.run_number }}"
          tag: "build-${{ github.run_id }}"
          replacesArtifacts: true
          allowUpdates: true
